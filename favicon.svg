<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bgGradient" x1="12%" y1="10%" x2="88%" y2="92%">
      <stop offset="0%" stop-color="#171717"/>
      <stop offset="55%" stop-color="#101010"/>
      <stop offset="100%" stop-color="#0b0b0b"/>
    </linearGradient>
    <linearGradient id="frameGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <linearGradient id="archiveGradient" x1="18%" y1="8%" x2="82%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="fileGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff6b8"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <radialGradient id="ambientGlow" cx="50%" cy="18%" r="65%">
      <stop offset="0%" stop-color="#6739b7" stop-opacity="0.38"/>
      <stop offset="65%" stop-color="#6739b7" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="18" fill="url(#bgGradient)"/>
  <rect x="2.5" y="2.5" width="59" height="59" rx="17.5" fill="none" stroke="url(#frameGlow)" stroke-opacity="0.3"/>
  <rect x="8" y="8" width="48" height="48" rx="15" fill="url(#ambientGlow)" opacity="0.9">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2.2s" repeatCount="indefinite"/>
  </rect>

  <g filter="url(#softGlow)">
    <g transform="translate(0 0)">
      <rect x="22" y="10" width="20" height="12" rx="3.2" fill="url(#fileGradient)"/>
      <path d="M36 10 L42 10 L42 16" fill="#ffe98a" opacity="0.82"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 4;0 0" dur="1.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.88;1" dur="1.9s" repeatCount="indefinite"/>
    </g>

    <g>
      <path d="M27 25 L32 31 L37 25" fill="none" stroke="#ffd700" stroke-width="3.1" stroke-linecap="round" stroke-linejoin="round">
        <animate attributeName="opacity" values="0.25;1;0.25" dur="1.2s" repeatCount="indefinite"/>
      </path>
      <line x1="32" y1="23" x2="32" y2="30" stroke="#ffd700" stroke-width="3.1" stroke-linecap="round">
        <animate attributeName="opacity" values="0.25;1;0.25" dur="1.2s" repeatCount="indefinite"/>
      </line>
    </g>

    <g transform="translate(0 0)">
      <rect x="16" y="32" width="32" height="18" rx="6" fill="url(#archiveGradient)"/>
      <rect x="16" y="29" width="32" height="7.5" rx="3.75" fill="#7344ca"/>
      <rect x="28.8" y="30.4" width="6.4" height="20" rx="3.2" fill="#ffd700"/>
      <rect x="30.1" y="34" width="3.8" height="2.8" rx="1.4" fill="#0d0d0d">
        <animate attributeName="y" values="34;39.6;34" dur="1.7s" repeatCount="indefinite"/>
      </rect>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 0.8;0 0" dur="1.7s" repeatCount="indefinite"/>
    </g>
  </g>

  <circle cx="47.5" cy="17" r="2.2" fill="#ffe55c">
    <animate attributeName="r" values="1.8;2.8;1.8" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.45;1;0.45" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
